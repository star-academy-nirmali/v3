<!doctype html>
<html>
  <head>
    <title>Results</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f5f5f5;
      }

      .header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
      }

      .card {
        background: white;
        margin: 15px;
        padding: 15px;
        border-radius: 10px;
      }

      select,
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 600px;
      }

      th {
        background: #2c3e50;
        color: white;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
      }

      .topper {
        background: #d4edda;
        font-weight: bold;
      }

      .table-container {
        overflow-x: auto;
      }
    </style>
  </head>

  <body>
    <div class="header">Star Academy Results</div>

    <div class="card">
      <select onchange="loadResults(this.value)">
        <option value="">Select Class</option>
        <option value="class-9">Class 9</option>
        <option value="class-10">Class 10</option>
        <option value="class-11">Class 11</option>
        <option value="class-12">Class 12</option>
      </select>

      <input
        type="text"
        id="search"
        placeholder="Search by Roll No"
        onkeyup="filterTable()"
      />
    </div>

    <div class="card table-container">
      <div id="result"></div>
    </div>

    <script>
      let fullData = [];

      const columns = [
        "Exam",
        "Roll No",
        "Correct Answers",
        "Incorrect Answers",
        "Not attempted",
        "Math Total Marks",
        "Rank",
      ];

      async function loadResults(className) {
        if (!className) return;

        try {
          const res = await fetch("data/" + className + ".json");
          const data = await res.json();

          fullData = data;
          renderTable(data);
        } catch {
          document.getElementById("result").innerHTML = "❌ Result not found";
        }
      }

      function renderTable(data) {
        let html = "<table><tr>";

        columns.forEach((c) => (html += `<th>${c}</th>`));
        html += "</tr>";

        data.forEach((row) => {
          const topper = row["Rank"] == 1 ? "topper" : "";

          html += `<tr class="${topper}">`;

          columns.forEach((c) => {
            html += `<td>${row[c] || ""}</td>`;
          });

          html += "</tr>";
        });

        html += "</table>";

        document.getElementById("result").innerHTML = html;
      }

      function filterTable() {
        const val = document.getElementById("search").value.toLowerCase();

        const filtered = fullData.filter((row) =>
          String(row["Roll No"]).toLowerCase().includes(val),
        );

        renderTable(filtered);
      }
    </script>
  </body>
</html>
