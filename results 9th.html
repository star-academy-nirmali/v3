<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results - Star Academy</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
      }

      header {
        background-color: #333;
        color: #fff;
        padding: 20px;
        text-align: center;
      }

      header h1,
      header h2 {
        margin: 0;
      }

      section {
        padding: 20px;
        text-align: center;
      }

      table {
        margin: 20px auto;
        border-collapse: collapse;
        width: 95%;
        background: white;
      }

      th {
        background: #333;
        color: white;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
      }

      tr:nth-child(even) {
        background: #f9f9f9;
      }

      .topper {
        background-color: #d4edda !important;
        font-weight: bold;
      }

      select {
        padding: 10px;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Star Academy Nirmali - 05</h1>
      <h2 id="title">Results For Class 9th</h2>
    </header>

    <section>
      <h2>Maths</h2>

      <!-- Class Selector -->
      <select onchange="loadResults(this.value)">
        <option value="class-09">Class 09th</option>
      </select>

      <!-- Table -->
      <div id="resultContainer">Loading...</div>
    </section>

    <script>
      const columns = [
        "Exam",
        "Roll No",
        "Correct Answers",
        "Incorrect Answers",
        "Not attempted",
        "Math",
        "Total Marks",
        "Rank",
      ];

      async function loadResults(className = "class-09") {
        document.getElementById("title").innerText =
          "Results For " + className.replace("-", " ").toUpperCase();

        try {
          const res = await fetch("data/" + className + ".json");
          const data = await res.json();

          let html = "<table><tr>";

          columns.forEach((col) => (html += `<th>${col}</th>`));
          html += "</tr>";

          data.forEach((row) => {
            const isTopper = row["Rank"] == 1;

            html += `<tr class="${isTopper ? "topper" : ""}">`;

            columns.forEach((col) => {
              html += `<td>${row[col] ?? ""}</td>`;
            });

            html += "</tr>";
          });

          html += "</table>";

          document.getElementById("resultContainer").innerHTML = html;
        } catch (err) {
          document.getElementById("resultContainer").innerHTML =
            "❌ Result not found. Please upload data.";
        }
      }

      // Load default
      loadResults();
    </script>
  </body>
</html>
